name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean workspace
        run: |
          rm -rf android
          rm -rf node_modules
          rm -rf package-lock.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Capacitor Android
        run: npm install @capacitor/android

      - name: Install Capacitor Assets
        run: npm install --save-dev @capacitor/assets

      - name: Dummy build
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Generate Android Icons
        run: npx capacitor-assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      #######################################################################
      # 🔥 UNSICHTBARER BROWSER OHNE X, OHNE TOOLBAR, OHNE BALKEN 🔥
      #######################################################################

      - name: Add androidx.browser dependency
        run: |
          sed -i '/dependencies {/a \
              implementation "androidx.browser:browser:1.8.0"' \
              android/app/build.gradle

      - name: Add No-UI Browser Activity
        run: |
          mkdir -p android/app/src/main/java/com/tgu/shopapp
          cat > android/app/src/main/java/com/tgu/shopapp/NoUiBrowserActivity.java << 'EOF'
          package com.tgu.shopapp;

          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import androidx.browser.customtabs.CustomTabsIntent;

          public class NoUiBrowserActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  CustomTabsIntent.Builder builder = new CustomTabsIntent.Builder();
                  builder.setShowTitle(false);
                  builder.setUrlBarHidingEnabled(true);

                  CustomTabsIntent customTabsIntent = builder.build();
                  customTabsIntent.intent.addFlags(Intent.FLAG_ACTIVITY_NO_HISTORY);
                  customTabsIntent.intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);

                  customTabsIntent.launchUrl(this, Uri.parse("https://www.tgu-shop.com"));
              }
          }
          EOF

      - name: Patch AndroidManifest for No-UI Browser
        run: |
          sed -i '/<\/application>/i \
              <activity android:name="com.tgu.shopapp.NoUiBrowserActivity" \
                  android:theme="@android:style/Theme.NoDisplay" \
                  android:excludeFromRecents="true" \
                  android:launchMode="singleTask" />' \
              android/app/src/main/AndroidManifest.xml

      - name: Patch MainActivity to launch No-UI Browser
        run: |
          sed -i '/package com.tgu.shopapp;/a \
              import android.content.Intent;' \
              android/app/src/main/java/com/tgu/shopapp/MainActivity.java

          sed -i '/super.onCreate(savedInstanceState);/a \
              Intent intent = new Intent(this, NoUiBrowserActivity.class); \
              startActivity(intent);' \
              android/app/src/main/java/com/tgu/shopapp/MainActivity.java

      #######################################################################
      # 🔥 SIGNIERUNG FÜR RELEASE-APK 🔥
      #######################################################################

      - name: Generate release keystore if missing
        run: |
          if [ ! -f release.keystore ]; then
            keytool -genkeypair \
              -alias tgu \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -keystore release.keystore \
              -storepass tgu123 \
              -keypass tgu123 \
              -dname "CN=TGU, OU=IT, O=TGU, L=Greven, S=NRW, C=DE"
          fi

      - name: Copy keystore into android app
        run: cp release.keystore android/app/release.keystore

      - name: Patch build.gradle for release signing
        run: |
          sed -i '/android {/a \
              signingConfigs { \
                  release { \
                      storeFile file("release.keystore") \
                      storePassword "tgu123" \
                      keyAlias "tgu" \
                      keyPassword "tgu123" \
                  } \
              }' android/app/build.gradle

          sed -i '/buildTypes {/a \
              release { \
                  signingConfig signingConfigs.release \
                  minifyEnabled false \
                  shrinkResources false \
              }' android/app/build.gradle

      #######################################################################
      # 🔥 RELEASE BUILD 🔥
      #######################################################################

      - name: Set ANDROID_HOME
        run: echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace --quiet

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: tgu-release.apk
          path: android/app/build/outputs/apk/release/*.apk