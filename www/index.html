<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klimmzüge Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div>
                <h1>Klimmzüge Tracker</h1>
            </div>
            <div class="storage-box">
                <div id="storageState">Speicherstatus wird geprüft ...</div>
            </div>
        </header>

        <main class="layout">
            <section class="card form-card">
                <h2>Tagesdaten</h2>

                <form id="entryForm">
                    <div class="field">
                        <label for="entryDate">Datum</label>
                        <input type="date" id="entryDate" required>
                    </div>

                    <div class="field">
                        <label for="pullups">Klimmzüge</label>
                        <input type="number" id="pullups" min="0" step="1" value="0" required>
                    </div>

                    <div class="field">
                        <label for="weightKg">Gewicht in kg</label>
                        <input type="number" id="weightKg" min="0" step="0.1" placeholder="z. B. 82.4">
                    </div>

                    <div class="button-row">
                        <button type="submit" class="btn primary">Speichern</button>
                        <button type="button" class="btn" id="resetBtn">Zurücksetzen</button>
                    </div>

                    <div class="button-row">
                        <button type="button" class="btn success" id="exportBtn">Backup exportieren</button>
                        <label class="btn file-btn">
                            Backup importieren
                            <input type="file" id="importFile" accept=".json,application/json" hidden>
                        </label>
                    </div>

                    <div id="status" class="status"></div>
                </form>

                <div class="stats-grid">
                    <div class="stat-box">
                        <span>Einträge</span>
                        <strong id="statEntries">0</strong>
                    </div>
                    <div class="stat-box">
                        <span>Gesamt Klimmzüge</span>
                        <strong id="statTotalPullups">0</strong>
                    </div>
                    <div class="stat-box">
                        <span>Ø pro Tag</span>
                        <strong id="statAvgDay">0</strong>
                    </div>
                    <div class="stat-box">
                        <span>Ø pro Woche</span>
                        <strong id="statAvgWeek">0</strong>
                    </div>
                </div>
            </section>

            <section class="charts">
                <div class="card">
                    <h2>Tagesverlauf</h2>
                    <div class="chart-wrap">
                        <canvas id="dailyChart" width="900" height="320"></canvas>
                    </div>
                </div>

                <div class="card">
                    <h2>Wochendurchschnitt</h2>
                    <div class="chart-wrap">
                        <canvas id="weeklyChart" width="900" height="320"></canvas>
                    </div>
                </div>
            </section>
        </main>

        <section class="card table-card">
            <h2>Verlauf</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Datum</th>
                            <th>Klimmzüge</th>
                            <th>Gewicht</th>
                            <th>Aktion</th>
                        </tr>
                    </thead>
                    <tbody id="entriesTableBody">
                        <tr>
                            <td colspan="4">Noch keine Daten vorhanden.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</body>
</html>
